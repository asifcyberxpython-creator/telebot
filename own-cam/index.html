<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stay Motivated</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0a0e27;
            overflow: hidden;
            position: relative;
        }

        /* Animated Grid Background */
        .grid-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(90deg, rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: 1;
        }

        @keyframes gridMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(50px); }
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            background: rgba(0, 255, 255, 0.6);
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            animation: particleFloat 8s ease-in-out infinite;
        }

        .particle:nth-child(1) {
            width: 4px;
            height: 4px;
            top: 20%;
            left: 10%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 6px;
            height: 6px;
            top: 60%;
            left: 80%;
            animation-delay: 2s;
        }

        .particle:nth-child(3) {
            width: 3px;
            height: 3px;
            top: 40%;
            left: 30%;
            animation-delay: 4s;
        }

        .particle:nth-child(4) {
            width: 5px;
            height: 5px;
            top: 70%;
            left: 60%;
            animation-delay: 1s;
        }

        .particle:nth-child(5) {
            width: 4px;
            height: 4px;
            top: 30%;
            left: 90%;
            animation-delay: 3s;
        }

        .particle:nth-child(6) {
            width: 6px;
            height: 6px;
            top: 80%;
            left: 20%;
            animation-delay: 5s;
        }

        @keyframes particleFloat {
            0%, 100% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            50% {
                transform: translateY(-80px) translateX(40px);
            }
        }

        /* Glowing Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
            animation: orbPulse 6s ease-in-out infinite;
        }

        .orb1 {
            width: 300px;
            height: 300px;
            background: rgba(0, 255, 255, 0.3);
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 400px;
            height: 400px;
            background: rgba(138, 43, 226, 0.25);
            bottom: -150px;
            right: -150px;
            animation-delay: 2s;
        }

        .orb3 {
            width: 250px;
            height: 250px;
            background: rgba(0, 150, 255, 0.2);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }

        @keyframes orbPulse {
            0%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.5;
            }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 40px 30px;
            max-width: 90%;
            width: 600px;
            background: rgba(10, 14, 39, 0.7);
            border: 2px solid rgba(0, 255, 255, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 0 60px rgba(0, 255, 255, 0.15),
                inset 0 0 60px rgba(0, 255, 255, 0.05);
            animation: containerFloat 6s ease-in-out infinite;
        }

        @keyframes containerFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        /* Corner Decorations */
        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid #00ffff;
            animation: cornerPulse 3s ease-in-out infinite;
        }

        .corner-tl {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
            border-radius: 20px 0 0 0;
        }

        .corner-tr {
            top: -2px;
            right: -2px;
            border-left: none;
            border-bottom: none;
            border-radius: 0 20px 0 0;
        }

        .corner-bl {
            bottom: -2px;
            left: -2px;
            border-right: none;
            border-top: none;
            border-radius: 0 0 0 20px;
        }

        .corner-br {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 20px 0;
        }

        @keyframes cornerPulse {
            0%, 100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        /* Title */
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00ffff, #0099ff, #00ffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 3s linear infinite, titleGlow 2s ease-in-out infinite alternate;
            text-transform: uppercase;
        }

        @keyframes textShine {
            to {
                background-position: 200% center;
            }
        }

        @keyframes titleGlow {
            from {
                filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5));
            }
            to {
                filter: drop-shadow(0 0 25px rgba(0, 255, 255, 0.9));
            }
        }

        /* Scan Line Effect */
        .scan-line {
            position: relative;
            height: 2px;
            margin: 15px auto;
            width: 100%;
            overflow: hidden;
        }

        .scan-line::before {
            content: '';
            position: absolute;
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: scanMove 2s linear infinite;
            box-shadow: 0 0 15px #00ffff;
        }

        @keyframes scanMove {
            0% {
                left: -40%;
            }
            100% {
                left: 100%;
            }
        }

        /* Line Divider */
        .line {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            margin: 20px auto;
            position: relative;
            animation: lineExpand 3s ease-in-out infinite;
        }

        .line::before,
        .line::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #00ffff;
            border-radius: 50%;
            top: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 15px #00ffff;
            animation: dotPulse 1.5s ease-in-out infinite;
        }

        .line::before {
            left: -15px;
        }

        .line::after {
            right: -15px;
            animation-delay: 0.75s;
        }

        @keyframes lineExpand {
            0%, 100% {
                width: 80px;
                opacity: 0.6;
            }
            50% {
                width: 140px;
                opacity: 1;
            }
        }

        @keyframes dotPulse {
            0%, 100% {
                transform: translateY(-50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translateY(-50%) scale(1.5);
                opacity: 0.5;
            }
        }

        /* Quote */
        .quote {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(1rem, 3vw, 1.4rem);
            line-height: 1.8;
            color: #b8e6ff;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0;
            animation: fadeInUp 2s ease forwards;
            animation-delay: 0.5s;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        @keyframes fadeInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Accent Bar */
        .accent-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 100%;
            background: linear-gradient(90deg, transparent, #00ffff, transparent);
            animation: accentMove 3s linear infinite;
        }

        @keyframes accentMove {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        /* Hexagon Pattern */
        .hex-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0.03;
            background-image: 
                linear-gradient(30deg, #00ffff 12%, transparent 12.5%, transparent 87%, #00ffff 87.5%, #00ffff),
                linear-gradient(150deg, #00ffff 12%, transparent 12.5%, transparent 87%, #00ffff 87.5%, #00ffff),
                linear-gradient(30deg, #00ffff 12%, transparent 12.5%, transparent 87%, #00ffff 87.5%, #00ffff),
                linear-gradient(150deg, #00ffff 12%, transparent 12.5%, transparent 87%, #00ffff 87.5%, #00ffff);
            background-size: 80px 140px;
            background-position: 0 0, 0 0, 40px 70px, 40px 70px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
                margin: 20px;
            }

            h1 {
                letter-spacing: 4px;
            }

            .corner {
                width: 20px;
                height: 20px;
            }

            .orb1, .orb2, .orb3 {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px 15px;
            }

            h1 {
                letter-spacing: 2px;
            }

            .line {
                width: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="grid-background"></div>
    
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="container">
        <div class="hex-pattern"></div>
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        
        <h1>STAY MOTIVATED</h1>
        <div class="scan-line"></div>
        <div class="line"></div>
        <p class="quote">
            "Your future is created by what you do today,<br>
            not tomorrow."
        </p>
        <div class="accent-bar"></div>
    </div>
</body>
</html>
